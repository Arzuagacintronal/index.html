<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alaik Media</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#f7f3ee] text-[#111111] font-sans">

<section class="max-w-6xl mx-auto px-6 py-20">
  <h1 class="text-5xl font-semibold">Alaik Media Management</h1>
  <p class="mt-4 text-lg text-black/70">
    Luxury websites & social media for modern businesses.
  </p>
</section>

<section class="max-w-6xl mx-auto px-6 py-20">
  <h2 class="text-4xl font-semibold mb-8">Pricing</h2>

  <div class="grid md:grid-cols-2 gap-6">

    <div class="bg-white p-8 rounded-2xl">
      <h3 class="text-2xl font-semibold">$397</h3>
      <p>Essential Website</p>
      <p class="mt-4">$60/month maintenance</p>
    </div>

    <div class="bg-black text-white p-8 rounded-2xl">
      <h3 class="text-2xl font-semibold">$597</h3>
      <p>Business Website</p>
      <p class="mt-4">$60/month maintenance</p>
    </div>

  </div>
</section>

<section class="max-w-6xl mx-auto px-6 py-20">
  <h2 class="text-4xl font-semibold">Contact</h2>

  <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST" class="mt-6 grid gap-4">
    <input type="text" name="name" placeholder="Your name" class="p-4 border rounded-xl">
    <input type="email" name="email" placeholder="Your email" class="p-4 border rounded-xl">
    <textarea name="message" placeholder="Your message" class="p-4 border rounded-xl"></textarea>
    <button class="bg-black text-white p-4 rounded-xl">Submit</button>
  </form>
</section>

</body>
</html>
